# ======================================
# ConsuHelp - Configurações da Aplicação
# ======================================

# Servidor
server.port=8080

# Nome da aplicação
spring.application.name=consuhelp-backend

# ======================================
# Google Gemini (Spring AI)
# ======================================
# Defina sua chave via variável de ambiente: GEMINI_API_KEY
spring.ai.vertex.ai.gemini.api-key=${GEMINI_API_KEY:AQ.Ab8RN6LMK5oYSgnf0sjPl0K_-OnYefiCRm6eeJ4q2hIV2CdNaQ}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-3.5-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.3
spring.ai.vertex.ai.gemini.chat.options.max-output-tokens=1024

# ======================================
# Logging
# ======================================
logging.level.com.consuhelp=DEBUG
logging.level.org.springframework.ai=INFO

# ======================================
# CORS (permite requisições do cliente JavaFX)
# ======================================
consuhelp.cors.allowed-origins=*
